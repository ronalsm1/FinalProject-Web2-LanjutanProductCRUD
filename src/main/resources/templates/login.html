<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!--Mengganti login.html Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<body class="bg-slate-50 min-h-screen">

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-center mt-16">
        <div class="w-full max-w-md">

            <!-- Brand -Billy -->
            <div class="flex flex-col items-center mb-7">
                <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Product CRUD</h2>
                <p class="text-sm text-slate-400 mt-1">Masuk ke akun Anda</p>
            </div>

            <!-- Error: username/password salah -->
            <div th:if="${param.error}"
                 class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 text-sm rounded-lg px-4 py-3 mb-4"
                 role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>Username atau password salah!</span>
            </div>

            <!-- Info: berhasil logout -->
            <div th:if="${param.logout}"
                 class="flex items-start gap-3 bg-blue-50 border border-blue-200 text-blue-800 text-sm rounded-lg px-4 py-3 mb-4"
                 role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>Berhasil logout.</span>
            </div>

            <!-- Success: registrasi berhasil -->
            <div th:if="${success}"
                 class="flex items-start gap-3 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm rounded-lg px-4 py-3 mb-4"
                 role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${success}"></span>
            </div>

            <!-- Card -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-7">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Login</h3>

                    <form th:action="@{/login}" method="post" class="space-y-5">

                        <!-- Username -->
                        <div class="flex flex-col gap-1.5">
                            <label for="username" class="text-sm font-semibold text-slate-700">Username</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                </div>
                                <input type="text" id="username" name="username"
                                       placeholder="Masukkan username" required autofocus
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="flex flex-col gap-1.5">
                            <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <input type="password" id="password" name="password"
                                       placeholder="Masukkan password" required
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                            </div>
                        </div>

                        <!-- Submit -->
                        <button type="submit"
                                class="w-full inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200 mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                            </svg>
                            Login
                        </button>

                    </form>

                    <!-- Register Link -->
                    <p class="text-center text-sm text-slate-500 mt-5">
                        Belum punya akun?
                        <a th:href="@{/register}" class="text-blue-600 hover:text-blue-700 font-semibold transition-colors duration-150">Daftar di sini</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
