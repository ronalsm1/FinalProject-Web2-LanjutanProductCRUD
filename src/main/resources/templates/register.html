<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!--Mengganti register.html Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<body class="bg-slate-50 min-h-screen">

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-center mt-16">
        <div class="w-full max-w-md">

            <!-- Brand -Billy -->
            <div class="flex flex-col items-center mb-7">
                <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Product CRUD</h2>
                <p class="text-sm text-slate-400 mt-1">Buat akun baru</p>
            </div>

            <!-- Error message -->
            <div th:if="${error}"
                 class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 text-sm rounded-lg px-4 py-3 mb-4"
                 role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${error}"></span>
            </div>

            <!-- Card -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-7">
                    <h3 class="text-lg font-bold text-slate-800 mb-6">Register</h3>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-5">

                        <!-- Ronald Saut M. tambah fullName dan email -->

                        <!-- Nama Lengkap -->
                        <div class="flex flex-col gap-1.5">
                            <label for="fullName" class="text-sm font-semibold text-slate-700">Nama Lengkap</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                </div>
                                <input type="text"
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition"
                                       id="fullName"
                                       th:field="*{fullName}"
                                       placeholder="Masukkan nama lengkap"
                                       required>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="flex flex-col gap-1.5">
                            <label for="email" class="text-sm font-semibold text-slate-700">
                                Email
                                <span class="text-slate-400 font-normal">(Opsional)</span>
                            </label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                </div>
                                <input type="text"
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition"
                                       id="email"
                                       th:field="*{email}"
                                       placeholder="Masukkan email">
                            </div>
                        </div>

                        <!-- Username -->
                        <div class="flex flex-col gap-1.5">
                            <label for="username" class="text-sm font-semibold text-slate-700">Username</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                </div>
                                <input type="text"
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition"
                                       id="username"
                                       th:field="*{username}"
                                       placeholder="Masukkan username"
                                       required
                                       autofocus>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="flex flex-col gap-1.5">
                            <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <input type="password"
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition"
                                       id="password"
                                       th:field="*{password}"
                                       placeholder="Masukkan password"
                                       required>
                            </div>
                        </div>

                        <!-- Konfirmasi Password -->
                        <div class="flex flex-col gap-1.5">
                            <label for="confirmPassword" class="text-sm font-semibold text-slate-700">Konfirmasi Password</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                    </svg>
                                </div>
                                <input type="password"
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition"
                                       id="confirmPassword"
                                       th:field="*{confirmPassword}"
                                       placeholder="Ulangi password"
                                       required>
                            </div>
                        </div>

                        <!-- Submit -->
                        <button type="submit"
                                class="w-full inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200 mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                            </svg>
                            Daftar
                        </button>

                    </form>

                    <!-- Login Link -->
                    <p class="text-center text-sm text-slate-500 mt-5">
                        Sudah punya akun?
                        <a th:href="@{/login}" class="text-blue-600 hover:text-blue-700 font-semibold transition-colors duration-150">Login di sini</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
