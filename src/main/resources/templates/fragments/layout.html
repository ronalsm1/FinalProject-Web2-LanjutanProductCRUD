<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Header Fragment -->
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import font dan pengaturan layout dasar halaman -Billy */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        html, body { min-height: 100vh; display: flex; flex-direction: column; }
        body > *:not(nav):not(footer) { flex: 1; }
    </style>
</head>

<!--Mengganti layout.html dan style.css Dari Menggunakan Bootstrap dan css murni
 Menjadi Tailwind Css saja dan menghapus css murni nya -Billy-->
<!-- Navbar Fragment -->
<nav th:fragment="navbar"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="bg-slate-900 border-b border-slate-800 mb-6">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-14">

            <!-- Brand + Nav Links -Billy -->
            <div class="flex items-center gap-6">
                <a th:href="@{/}" class="text-white font-extrabold text-base tracking-tight flex items-center gap-2">
                    Product CRUD
                </a>
                <ul class="hidden md:flex items-center gap-1">
                    <li>
                        <a th:href="@{/}" class="text-slate-300 hover:text-white hover:bg-slate-800 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors duration-150">Home</a>
                    </li>
                    <li>
                        <a th:href="@{/products}" class="text-slate-300 hover:text-white hover:bg-slate-800 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors duration-150">Products</a>
                    </li>
                    <!-- menambahkan nav categories -> josef -->
                    <li>
                        <a th:href="@{/categories}" class="text-slate-300 hover:text-white hover:bg-slate-800 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors duration-150">Categories</a>
                    </li>
                    <li>
                        <a th:href="@{/dashboard}" class="text-slate-300 hover:text-white hover:bg-slate-800 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors duration-150">Dashboard</a>
                    </li>
                </ul>
            </div>

            <!-- Profile Dropdown -->
            <!-- Ronald Saut M. update navigation bar nya -->
            <div sec:authorize="isAuthenticated()" class="relative" x-data="{ open: false }">
                <button onclick="this.nextElementSibling.classList.toggle('hidden')"
                        class="inline-flex items-center gap-2 text-sm font-semibold text-slate-300 hover:text-white border border-slate-700 hover:border-slate-500 px-3 py-1.5 rounded-lg transition-colors duration-150">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Halo, <strong th:text="${#authentication.name}" class="text-white">User</strong>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>

                <!-- Dropdown Menu -Billy -->
                <div class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-slate-200 py-1 z-50">
                    <a th:href="@{/profile}"
                       class="flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors duration-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        View Profile
                    </a>
                    <div class="border-t border-slate-100 my-1"></div>
                    <form th:action="@{/logout}" method="post" class="px-3 pb-1">
                        <button type="submit"
                                class="w-full inline-flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 text-white text-sm font-semibold px-3 py-1.5 rounded-lg transition-colors duration-150">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                            Logout
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</nav>

<!-- Footer Fragment -->
<footer th:fragment="footer" class="border-t border-slate-200 mt-10">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <p class="text-center text-slate-400 text-sm py-4">
            Product CRUD — Praktikum JPA Fundamentals — 2026
        </p>
    </div>
</footer>

</html>
