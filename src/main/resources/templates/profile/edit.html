<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h3 class="mb-4">Edit Profile</h3>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/profile/edit}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" class="form-control" th:field="*{fullName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">No. Handphone</label>
                            <input type="text" class="form-control" th:field="*{phoneNumber}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Alamat</label>
                            <textarea class="form-control" th:field="*{address}" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bio Singkat</label>
                            <textarea class="form-control" th:field="*{bio}" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL Foto Profil</label>
                            <input type="text" class="form-control" th:field="*{profileImageUrl}" placeholder="https://contoh.com/foto.jpg">
                            <div class="form-text">Masukkan link gambar (URL) untuk foto profil.</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                            <a th:href="@{/profile}" class="btn btn-secondary">Batal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
