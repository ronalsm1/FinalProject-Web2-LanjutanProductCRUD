<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!--Mengganti change-password.html Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<body class="bg-slate-50 min-h-screen">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 pb-12">
    <div class="flex justify-center">
        <div class="w-full max-w-md">

            <!-- Page Title -->
            <h3 class="text-2xl font-bold text-slate-800 tracking-tight mb-6">Ganti Password</h3>

            <!-- Error Alert -->
            <div th:if="${errorMessage}"
                 class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 text-sm rounded-lg px-4 py-3 mb-5"
                 role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${errorMessage}" class="flex-1"></span>
                <button type="button" onclick="this.closest('[role=alert]').remove()"
                        class="text-red-600 hover:text-red-800 font-bold text-lg leading-none">&times;</button>
            </div>

            <!-- Card -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6">
                    <form th:action="@{/profile/change-password}" th:object="${passwordRequest}" method="post" class="space-y-5">

                        <!-- Password Lama -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-slate-700">Password Lama</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <input type="password" th:field="*{oldPassword}" required
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                            </div>
                        </div>

                        <!-- Password Baru -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-slate-700">Password Baru</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                                    </svg>
                                </div>
                                <input type="password" th:field="*{newPassword}" required
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                            </div>
                        </div>

                        <!-- Konfirmasi Password Baru -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-slate-700">Konfirmasi Password Baru</label>
                            <div class="relative">
                                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                    </svg>
                                </div>
                                <input type="password" th:field="*{confirmNewPassword}" required
                                       class="w-full pl-10 pr-4 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                            </div>
                        </div>

                        <!-- Divider -->
                        <div class="border-t border-slate-100 pt-1"></div>

                        <!-- Buttons -->
                        <div class="flex gap-3">
                            <button type="submit"
                                    class="flex-1 inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                Simpan Password Baru
                            </button>
                            <a th:href="@{/profile}"
                               class="flex-1 inline-flex items-center justify-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                                </svg>
                                Batal
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
