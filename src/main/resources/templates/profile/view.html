<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">

                    <img th:if="${user.profileImageUrl == null or user.profileImageUrl.isEmpty()}"
                         th:src="@{'https://ui-avatars.com/api/?name=' + ${user.fullName != null ? user.fullName : user.username} + '&background=0D8ABC&color=fff&size=150'}"
                         class="rounded-lg mb-3 shadow" alt="Placeholder" style="width: 150px; height: 150px;">

                    <img th:unless="${user.profileImageUrl == null or user.profileImageUrl.isEmpty()}"
                         th:src="${user.profileImageUrl}"
                         class="rounded-lg mb-3 shadow" alt="Profile Image" style="width: 150px; height: 150px; object-fit: cover;">

                    <h3 class="mb-0" th:text="${user.fullName != null and !user.fullName.isEmpty()} ? ${user.fullName} : ${user.username}">Nama</h3>
                    <p class="text-muted" th:text="${'@' + user.username}">@username</p>

                    <p class="mt-3" th:text="${user.bio != null ? user.bio : 'Belum ada bio.'}"></p>

                    <hr>

                    <div class="text-start mt-4">
                        <p><strong>Email:</strong> <span th:text="${user.email != null ? user.email : '-'}"></span></p>
                        <p><strong>No. HP:</strong> <span th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}"></span></p>
                        <p><strong>Alamat:</strong> <span th:text="${user.address != null ? user.address : '-'}"></span></p>
                    </div>

                    <div class="mt-4 gap-2 d-flex justify-content-center">
                        <a th:href="@{/profile/edit}" class="btn btn-primary">Edit Profile</a>
                        <a th:href="@{/profile/change-password}" class="btn btn-outline-secondary">Ganti Password</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
