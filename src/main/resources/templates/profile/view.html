<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!--Mengganti view.html Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<body class="bg-slate-50 min-h-screen">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 pb-12">

    <!-- Membuat Success Alert -Billy -->
    <div th:if="${successMessage}"
         class="flex items-start gap-3 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm rounded-lg px-4 py-3 mb-5"
         role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span th:text="${successMessage}" class="flex-1"></span>
        <button type="button" onclick="this.closest('[role=alert]').remove()"
                class="text-emerald-600 hover:text-emerald-800 font-bold text-lg leading-none">&times;</button>
    </div>

    <div class="flex justify-center">
        <div class="w-full max-w-2xl">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">

                <!-- Profile Header -->
                <div class="flex flex-col items-center text-center px-8 pt-8 pb-6">

                    <!-- Avatar -->
                    <div class="mb-4">
                        <img th:if="${user.profileImageUrl == null or user.profileImageUrl.isEmpty()}"
                             th:src="@{'https://ui-avatars.com/api/?name=' + ${user.fullName != null ? user.fullName : user.username} + '&background=0D8ABC&color=fff&size=150'}"
                             class="w-28 h-28 rounded-2xl shadow-md object-cover ring-4 ring-slate-100"
                             alt="Placeholder">
                        <img th:unless="${user.profileImageUrl == null or user.profileImageUrl.isEmpty()}"
                             th:src="${user.profileImageUrl}"
                             class="w-28 h-28 rounded-2xl shadow-md object-cover ring-4 ring-slate-100"
                             alt="Profile Image">
                    </div>

                    <!-- Name & Username -->
                    <h3 th:text="${user.fullName != null and !user.fullName.isEmpty()} ? ${user.fullName} : ${user.username}"
                        class="text-xl font-bold text-slate-800 mb-0.5">Nama</h3>
                    <p th:text="${'@' + user.username}"
                       class="text-sm text-slate-400 font-medium">@username</p>

                    <!-- Bio -->
                    <p th:text="${user.bio != null ? user.bio : 'Belum ada bio.'}"
                       class="mt-3 text-sm text-slate-600 max-w-sm leading-relaxed"></p>
                </div>

                <!-- Divider -->
                <div class="border-t border-slate-100 mx-6"></div>

                <!-- Info Detail -->
                <div class="px-8 py-6 space-y-4">

                    <div class="flex items-start gap-3">
                        <div class="shrink-0 w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center mt-0.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Email</p>
                            <p th:text="${user.email != null ? user.email : '-'}" class="text-sm text-slate-700 font-medium mt-0.5">-</p>
                        </div>
                    </div>

                    <div class="flex items-start gap-3">
                        <div class="shrink-0 w-8 h-8 bg-emerald-50 rounded-lg flex items-center justify-center mt-0.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">No. HP</p>
                            <p th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}" class="text-sm text-slate-700 font-medium mt-0.5">-</p>
                        </div>
                    </div>

                    <div class="flex items-start gap-3">
                        <div class="shrink-0 w-8 h-8 bg-amber-50 rounded-lg flex items-center justify-center mt-0.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Alamat</p>
                            <p th:text="${user.address != null ? user.address : '-'}" class="text-sm text-slate-700 font-medium mt-0.5">-</p>
                        </div>
                    </div>

                </div>

                <!-- Divider -->
                <div class="border-t border-slate-100 mx-6"></div>

                <!-- Action Buttons -->
                <div class="flex items-center justify-center gap-3 px-8 py-5">
                    <a th:href="@{/profile/edit}"
                       class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        Edit Profile
                    </a>
                    <a th:href="@{/profile/change-password}"
                       class="inline-flex items-center gap-2 border border-slate-300 hover:border-slate-400 bg-white hover:bg-slate-50 text-slate-700 text-sm font-semibold px-5 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        Ganti Password
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
