<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!--Mengganti list.html Product Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<body class="bg-slate-50 min-h-screen">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 pb-12">

    <!-- Header Row -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Daftar Produk</h2>
            <p class="text-slate-500 text-sm mt-1">Kelola semua produk yang tersedia</p>
        </div>
        <a th:href="@{/products/new}"
           class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Tambah Produk Baru
        </a>
    </div>

    <!-- Search & Filter ~Brandon David -->
    <form method="get" th:action="@{/products}" class="flex flex-wrap gap-3 mb-5">
        <div class="relative flex-1 min-w-[200px] max-w-xs">
            <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
            <input type="text" name="keyword"
                   th:value="${keyword}"
                   class="w-full pl-10 pr-4 py-2.5 text-sm border border-slate-200 rounded-lg bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition"
                   placeholder="Cari produk...">
        </div>

        <div class="min-w-[180px]">
            <select name="categoryId"
                    class="w-full px-3.5 py-2.5 text-sm border border-slate-200 rounded-lg bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition appearance-none cursor-pointer">
                <option value="">Semua Kategori</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == categoryId}">
                </option>
            </select>
        </div>

        <button type="submit"
                class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
            Search
        </button>
    </form>

    <!-- Success Alert -->
    <div th:if="${successMessage}"
         class="flex items-start gap-3 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm rounded-lg px-4 py-3 mb-4"
         role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span th:text="${successMessage}" class="flex-1"></span>
        <button type="button" onclick="this.closest('[role=alert]').remove()"
                class="text-emerald-600 hover:text-emerald-800 font-bold text-lg leading-none">&times;</button>
    </div>

    <!-- Error Alert -->
    <div th:if="${errorMessage}"
         class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-800 text-sm rounded-lg px-4 py-3 mb-4"
         role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span th:text="${errorMessage}" class="flex-1"></span>
        <button type="button" onclick="this.closest('[role=alert]').remove()"
                class="text-red-600 hover:text-red-800 font-bold text-lg leading-none">&times;</button>
    </div>

    <!-- Product Count -->
    <p class="text-sm text-slate-500 mb-3">
        Total produk: <span th:text="${totalItems}" class="font-semibold text-slate-700">0</span>
    </p>

    <!-- Product Table -->
    <div th:if="${!#lists.isEmpty(products)}" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
            <thead>
            <tr class="bg-slate-800 text-slate-100">
                <th class="text-left px-4 py-3.5 font-semibold w-10">No</th>
                <th class="text-left px-4 py-3.5 font-semibold">Nama</th>
                <th class="text-left px-4 py-3.5 font-semibold">Kategori</th>
                <th class="text-left px-4 py-3.5 font-semibold">Harga</th>
                <th class="text-left px-4 py-3.5 font-semibold">Stok</th>
                <th class="text-left px-4 py-3.5 font-semibold">Status</th>
                <th class="text-left px-4 py-3.5 font-semibold">Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product, iterStat : ${products}"
                class="border-t border-slate-100 hover:bg-slate-50 transition-colors duration-100"
                th:classappend="${iterStat.odd} ? 'bg-slate-50/50'">
                <td th:text="${iterStat.index + 1}" class="px-4 py-3.5 text-slate-500 font-medium">1</td>
                <td th:text="${product.name}" class="px-4 py-3.5 text-slate-800 font-semibold">Nama Produk</td>
                <td th:text="${product.category?.name}" class="px-4 py-3.5 text-slate-600">Kategori</td>
                <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}"
                    class="px-4 py-3.5 text-slate-700 font-medium">Rp 0</td>
                <td th:text="${product.stock}" class="px-4 py-3.5 text-slate-600">0</td>
                <td class="px-4 py-3.5">
                    <span th:if="${product.active}"
                          class="inline-flex items-center gap-1 text-xs font-semibold text-emerald-700 bg-emerald-100 px-2.5 py-1 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                        </svg>
                        Aktif
                    </span>
                    <span th:unless="${product.active}"
                          class="inline-flex items-center gap-1 text-xs font-semibold text-red-700 bg-red-100 px-2.5 py-1 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                        Tidak Aktif
                    </span>
                </td>
                <td class="px-4 py-3.5">
                    <div class="flex items-center gap-1.5">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="inline-flex items-center gap-1 bg-cyan-500 hover:bg-cyan-600 text-white text-xs font-semibold px-2.5 py-1.5 rounded-md transition-colors duration-150">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            Detail
                        </a>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}"
                           class="inline-flex items-center gap-1 bg-amber-400 hover:bg-amber-500 text-amber-900 text-xs font-semibold px-2.5 py-1.5 rounded-md transition-colors duration-150">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                            Edit
                        </a>
                        <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;"
                              onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?');">
                            <button type="submit"
                                    class="inline-flex items-center gap-1 bg-red-500 hover:bg-red-600 text-white text-xs font-semibold px-2.5 py-1.5 rounded-md transition-colors duration-150">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7h6m-7 0a1 1 0 01-1-1V5a1 1 0 011-1h8a1 1 0 011 1v1a1 1 0 01-1 1H9z"/>
                                </svg>
                                Hapus
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(products)}" class="flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-slate-200 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-slate-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
        <p class="text-slate-500 text-base mb-4">Belum ada produk.</p>
        <a th:href="@{/products/new}"
           class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Tambah Produk
        </a>
    </div>

    <!-- Pagination ~Brandon David -->
    <nav th:if="${!#lists.isEmpty(products)}" class="mt-6 flex justify-center">
        <ul class="inline-flex items-center gap-1">

            <!-- Previous -->
            <li>
                <a th:if="${currentPage > 0}"
                   th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId})}"
                   class="inline-flex items-center gap-1 px-3.5 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-100 hover:text-slate-800 transition-colors duration-150 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Previous
                </a>
                <span th:if="${currentPage == 0}"
                      class="inline-flex items-center gap-1 px-3.5 py-2 text-sm font-medium text-slate-300 bg-white border border-slate-100 rounded-lg cursor-not-allowed shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Previous
                </span>
            </li>

            <!-- Page Numbers -->
            <li th:each="i : ${totalPages > 0 ? #numbers.sequence(0, totalPages - 1) : {0}}">
                <a th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId})}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage}
                       ? 'bg-blue-600 text-white border-blue-600 shadow'
                       : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100 hover:text-slate-800'"
                   class="inline-flex items-center justify-center w-9 h-9 text-sm font-semibold border rounded-lg transition-colors duration-150 shadow-sm">
                </a>
            </li>

            <!-- Next -->
            <li>
                <a th:if="${currentPage < totalPages - 1}"
                   th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId})}"
                   class="inline-flex items-center gap-1 px-3.5 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-100 hover:text-slate-800 transition-colors duration-150 shadow-sm">
                    Next
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </a>
                <span th:if="${currentPage >= totalPages - 1}"
                      class="inline-flex items-center gap-1 px-3.5 py-2 text-sm font-medium text-slate-300 bg-white border border-slate-100 rounded-lg cursor-not-allowed shadow-sm">
                    Next
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </span>
            </li>

        </ul>
    </nav>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
