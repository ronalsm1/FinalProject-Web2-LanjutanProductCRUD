<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!--Mengganti detail.html Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<body class="bg-slate-50 min-h-screen">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 pb-12">
    <div class="flex justify-center">
        <div class="w-full max-w-2xl">

            <!-- Page Title -->
            <h2 th:text="${product.name}"
                class="text-2xl font-bold text-slate-800 tracking-tight mb-6">Nama Produk</h2>

            <!-- Detail Card -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
                <table class="w-full min-w-[360px] text-sm">
                    <tbody class="divide-y divide-slate-100">

                    <tr class="hover:bg-slate-50 transition-colors duration-100">
                        <th class="text-left px-5 py-3.5 text-slate-500 font-medium w-44 whitespace-nowrap">Nama</th>
                        <td th:text="${product.name}" class="px-5 py-3.5 text-slate-800 font-semibold">-</td>
                    </tr>

                    <tr class="hover:bg-slate-50 transition-colors duration-100">
                        <th class="text-left px-5 py-3.5 text-slate-500 font-medium whitespace-nowrap">Kategori</th>
                        <!-- Mengganti .displayName menjadi .name-->
                        <td th:text="${product.category?.name}" class="px-5 py-3.5 text-slate-700">-</td>
                    </tr>

                    <tr class="hover:bg-slate-50 transition-colors duration-100">
                        <th class="text-left px-5 py-3.5 text-slate-500 font-medium whitespace-nowrap">Harga</th>
                        <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}"
                            class="px-5 py-3.5 text-slate-700 font-semibold">Rp 0</td>
                    </tr>

                    <tr class="hover:bg-slate-50 transition-colors duration-100">
                        <th class="text-left px-5 py-3.5 text-slate-500 font-medium whitespace-nowrap">Stok</th>
                        <td th:text="${product.stock}" class="px-5 py-3.5 text-slate-700">0</td>
                    </tr>

                    <tr class="hover:bg-slate-50 transition-colors duration-100">
                        <th class="text-left px-5 py-3.5 text-slate-500 font-medium whitespace-nowrap">Deskripsi</th>
                        <td th:text="${product.description}" class="px-5 py-3.5 text-slate-700">-</td>
                    </tr>

                    <tr class="hover:bg-slate-50 transition-colors duration-100">
                        <th class="text-left px-5 py-3.5 text-slate-500 font-medium whitespace-nowrap">Status</th>
                        <td class="px-5 py-3.5">
                                <span th:if="${product.active}"
                                      class="inline-flex items-center gap-1 text-xs font-semibold text-emerald-700 bg-emerald-100 px-2.5 py-1 rounded-full">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                                    </svg>
                                    Aktif
                                </span>
                            <span th:unless="${product.active}"
                                  class="inline-flex items-center gap-1 text-xs font-semibold text-red-700 bg-red-100 px-2.5 py-1 rounded-full">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                    Tidak Aktif
                                </span>
                        </td>
                    </tr>

                    <tr class="hover:bg-slate-50 transition-colors duration-100">
                        <th class="text-left px-5 py-3.5 text-slate-500 font-medium whitespace-nowrap">Tanggal Dibuat</th>
                        <td th:text="${product.createdAt}" class="px-5 py-3.5 text-slate-700">-</td>
                    </tr>

                    </tbody>
                </table>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-wrap items-center gap-3 mt-5">
                <a th:href="@{/products/{id}/edit(id=${product.id})}"
                   class="inline-flex items-center gap-2 bg-amber-400 hover:bg-amber-500 text-amber-900 text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    Edit
                </a>
                <a th:href="@{/products}"
                   class="inline-flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-semibold px-4 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Kembali ke Daftar
                </a>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
