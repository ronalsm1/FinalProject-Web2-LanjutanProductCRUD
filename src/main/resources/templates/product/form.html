<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<!--Mengganti form.html Product Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<body class="bg-slate-50 min-h-screen">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 pb-12">
    <div class="flex justify-center">
        <div class="w-full max-w-2xl">

            <!-- Page Title -->
            <h2 th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'"
                class="text-2xl font-bold text-slate-800 tracking-tight mb-6">Form Produk</h2>

            <!-- Form Card -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <form th:action="@{/products/save}" th:object="${product}" method="post" class="p-4 sm:p-6 space-y-5">

                    <!-- Hidden ID -->
                    <input type="hidden" th:field="*{id}">

                    <!-- Nama Produk -->
                    <div class="flex flex-col gap-1.5">
                        <label for="name" class="text-sm font-semibold text-slate-700">Nama Produk</label>
                        <input type="text" id="name" th:field="*{name}"
                               placeholder="Masukkan nama produk" required
                               class="w-full px-3.5 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                    </div>

                    <!-- Kategori -->
                    <div class="flex flex-col gap-1.5">
                        <label for="category" class="text-sm font-semibold text-slate-700">Kategori</label>
                        <select id="category" th:field="*{category}" required
                                class="w-full px-3.5 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition appearance-none cursor-pointer">
                            <option value="">-- Pilih Kategori --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Kategori</option>
                        </select>
                    </div>

                    <!-- Harga -->
                    <div class="flex flex-col gap-1.5">
                        <label for="priceDisplay" class="text-sm font-semibold text-slate-700">Harga</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm text-slate-400 font-medium select-none">Rp</span>
                            <input type="hidden" th:field="*{price}">
                            <input type="text" id="priceDisplay"
                                   placeholder="0" required
                                   class="w-full pl-10 pr-3.5 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                        </div>
                    </div>

                    <!-- Stok -->
                    <div class="flex flex-col gap-1.5">
                        <label for="stock" class="text-sm font-semibold text-slate-700">Stok</label>
                        <input type="number" id="stock" th:field="*{stock}"
                               min="0" placeholder="Masukkan jumlah stok" required
                               class="w-full px-3.5 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                    </div>

                    <!-- Deskripsi -->
                    <div class="flex flex-col gap-1.5">
                        <label for="description" class="text-sm font-semibold text-slate-700">Deskripsi</label>
                        <textarea id="description" th:field="*{description}"
                                  rows="3" placeholder="Masukkan deskripsi produk"
                                  class="w-full px-3.5 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition resize-none"></textarea>
                    </div>

                    <!-- Produk Aktif -->
                    <div class="flex items-center gap-3">
                        <div class="relative flex items-center">
                            <input type="checkbox" id="active" th:field="*{active}"
                                   class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                        </div>
                        <label for="active" class="text-sm font-medium text-slate-700 cursor-pointer select-none">Produk Aktif</label>
                    </div>

                    <!-- Tanggal Dibuat -->
                    <div class="flex flex-col gap-1.5">
                        <label for="createdAt" class="text-sm font-semibold text-slate-700">Tanggal Dibuat</label>
                        <input type="date" id="createdAt" th:field="*{createdAt}" required
                               class="w-full px-3.5 py-2.5 text-sm text-slate-800 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm transition">
                    </div>

                    <!-- Divider -->
                    <div class="border-t border-slate-100 pt-2"></div>

                    <!-- Buttons -->
                    <div class="flex flex-wrap items-center gap-3">
                        <button type="submit"
                                class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            Simpan Produk
                        </button>
                        <a th:href="@{/products}"
                           class="inline-flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-semibold px-5 py-2.5 rounded-lg shadow-sm transition-colors duration-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                            Batal
                        </a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    const priceHidden = document.getElementById('price');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatThousand(value) {
        return Number(value).toLocaleString('id-ID');
    }

    // Init: format existing value
    if (priceHidden.value && priceHidden.value !== '0') {
        priceDisplay.value = formatThousand(priceHidden.value);
    }

    // On input: format display, sync raw value to hidden, preserve cursor
    priceDisplay.addEventListener('input', function () {
        const oldValue = this.value;
        const cursorPos = this.selectionStart;
        const dotsBeforeCursor = oldValue.substring(0, cursorPos).split('.').length - 1;

        const raw = oldValue.replace(/\./g, '').replace(/\D/g, '');
        priceHidden.value = raw;
        const formatted = raw ? formatThousand(raw) : '';
        this.value = formatted;

        const digitPos = cursorPos - dotsBeforeCursor;
        const newDotsBeforeCursor = formatted.substring(0, digitPos + dotsBeforeCursor + 1).split('.').length - 1;
        this.setSelectionRange(digitPos + newDotsBeforeCursor, digitPos + newDotsBeforeCursor);
    });
</script>
</body>
</html>
