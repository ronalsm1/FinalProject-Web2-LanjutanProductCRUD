<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">

</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!--Mengganti form.html Category Dari Menggunakan Bootstrap Menjadi Tailwind Css -Billy-->
<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow">
            <div class="bg-blue-600 text-white px-6 py-4 rounded-t-lg">
                <h4 class="text-lg font-semibold" th:text="${category.id != null} ? 'Edit Kategori' : 'Tambah Kategori'">Form Kategori</h4>
            </div>
            <div class="p-6">
                <form th:action="@{/categories/save}" th:object="${category}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-4">
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Nama Kategori</label>
                        <input type="text" id="name" th:field="*{name}" required
                               class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div class="mb-6">
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Deskripsi</label>
                        <textarea id="description" th:field="*{description}" rows="3"
                                  class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>

                    <div class="flex justify-end gap-2">
                        <a th:href="@{/categories}" class="px-4 py-2 text-sm rounded-md bg-gray-200 text-gray-700 hover:bg-gray-300">Batal</a>
                        <button type="submit" class="px-4 py-2 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
